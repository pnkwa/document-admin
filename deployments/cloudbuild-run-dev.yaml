steps:
    - name: gcr.io/cloud-builders/docker
      entrypoint: /bin/bash
      args:
          - -c
          - |
              docker run \
                  --network=cloudbuild \
                  -v /workspace:/workspace \
                      gcr.io/kaniko-project/executor:latest \
                        --dockerfile /workspace/Dockerfile \
                        --destination=$_GCR_HOSTNAME/$_PROJECT_ID/$_ARTIFACT_REGISTRY/$_SERVICE_NAME:$_TAG \
                        --cache=true \
                        --cache-ttl=10h \
                        --compressed-caching=false \
                        --build-arg=API_BASE_URL=${_API_BASE_URL} \
                        --build-arg=CLIENT_BASE_URL=${_CLIENT_BASE_URL}

    - name: gcr.io/cloud-builders/gcloud
      args:
          - run
          - deploy
          - $_SERVICE_NAME
          - "--image"
          - $_GCR_HOSTNAME/$_PROJECT_ID/$_ARTIFACT_REGISTRY/$_SERVICE_NAME:$_TAG
          - "--port=80"
          - "--region=$_DEPLOY_REGION"
          - "--platform=managed"
          - "--allow-unauthenticated"

options:
    substitutionOption: ALLOW_LOOSE
    logging: CLOUD_LOGGING_ONLY

substitutions:
    _DEPLOY_REGION: asia-southeast1
    _SERVICE_NAME: daywork-document-admin
    _TAG: latest
    _GCR_HOSTNAME: asia-southeast1-docker.pkg.dev
    _ARTIFACT_REGISTRY: daywork-service
    _PROJECT_ID: daywork-215507
